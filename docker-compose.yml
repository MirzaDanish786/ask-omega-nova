services:
  postgres:
    image: postgres:16
    container_name: omega-nova-db
    environment:
      POSTGRES_USER: omega
      POSTGRES_PASSWORD: omega_secret
      POSTGRES_DB: omega_nova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omega -d omega_nova"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: omega-nova-api
    environment:
      DATABASE_URL: postgresql://omega:omega_secret@postgres:5432/omega_nova?schema=public
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: omega-nova-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
